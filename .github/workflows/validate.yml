name: Validate GeoJSON

# Validate every .geojson file in the repo on each push and pull request, so
# malformed or non-conformant GeoJSON can't merge to main.

on:
  pull_request:
  push:
    branches: [main]

  # Allow manual runs from the Actions tab
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    name: Validate GeoJSON files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .nvmrc

      - name: Validate all .geojson files
        run: ./scripts/validate.sh
