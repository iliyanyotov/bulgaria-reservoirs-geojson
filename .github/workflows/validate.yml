name: Validate GeoJSON

# Validate every .geojson file in the repo on each push and pull request.
# This is the single highest-value automation for a public dataset: it stops
# malformed or non-conformant GeoJSON from ever landing on main.

on:
  pull_request:
  push:
    branches: [main]

  # Allow manual runs from the Actions tab
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    name: Validate GeoJSON files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Validate all .geojson files
        run: ./scripts/validate.sh
